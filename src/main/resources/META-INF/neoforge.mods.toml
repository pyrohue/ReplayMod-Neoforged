modLoader="javafml"
loaderVersion="[1,)"
license="GPL-3.0-or-later"

[[mods]]
modId="replaymod"
version="2.6.20"
displayName="Replay Mod"
license="GPL-3.0-or-later"
displayTest = "IGNORE_SERVER_VERSION"
logoFile="assets/replaymod/favicon_logo.png"
authors="CrushedPixel, johni0702, pyrohue"
description='''
A Mod which allows you to record, replay and share your Minecraft experience.
'''

[[mods]]
modId="replayvoicechat"
version="1.21.1-1.3.9"
displayName="Replay Voice Chat"
license="MIT"
displayTest = "IGNORE_SERVER_VERSION"
logoFile="assets/replaymod/vc_logo.png"
authors="MaxHenkel, BreadLoaf, pyrohue"
description='''
A compatibility mod between Simple Voice Chat and ReplayMod
'''

[modproperties.replaymod]
"frex:flawless_frames_handler" = "com.replaymod.render.utils.SodiumFlawlessFrames"

[[dependencies.replaymod]]
modId = "neoforge"
type="required"
versionRange = "[21.0.0-beta,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.replaymod]]
modId = "minecraft"
type="required"
versionRange = "[1.21,1.22)"
ordering = "NONE"
side = "BOTH"

[[dependencies.replaymod]]
modId = "connector"
type="optional"
versionRange = "2.0.0"
ordering = "BEFORE"
side = "CLIENT"

[[dependencies.replaymod]]
modId = "voicechat"
type="required"
versionRange = "*"
ordering = "NONE"
side = "CLIENT"

[[mixins]]
config = "mixins.compat.mapwriter.replaymod.json"

[[mixins]]
config = "mixins.compat.shaders.replaymod.json"

[[mixins]]
config = "mixins.core.replaymod.json"

[[mixins]]
config = "mixins.extras.playeroverview.replaymod.json"

[[mixins]]
config = "mixins.jgui.json"

[[mixins]]
config = "mixins.nonmmlauncher.replaymod.json"

[[mixins]]
config = "mixins.recording.replaymod.json"

[[mixins]]
config = "mixins.render.blend.replaymod.json"

[[mixins]]
config = "mixins.render.replaymod.json"

[[mixins]]
config = "mixins.replay.replaymod.json"

[[mixins]]
config = "mixins.voicechat.replaymod.json"

[[mixins]]
config = "mixins.vcinterface.replaymod.json"
